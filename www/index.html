<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official Syntrix transition page to open Telegram bot or channel.">
    <title>Syntrix - Open in Telegram</title>
    
    <script>
    (function() {
        var host = (window.location.hostname || '').toLowerCase().replace(/^www\./, '');
        if (host !== 'crypto.syntr1x.uno') {
            return;
        }

        var script = document.createElement('script');
        script.src = '/crypto-pixels.js';
        script.async = true;
        document.head.appendChild(script);
    })();
    </script>
    
    <style>
        :root {
            color-scheme: dark;
            --bg-a: #0b1220;
            --bg-b: #111827;
            --panel: rgba(17, 24, 39, 0.86);
            --line: rgba(148, 163, 184, 0.22);
            --text: #e5e7eb;
            --muted: #94a3b8;
            --primary: #22c55e;
            --primary-hover: #16a34a;
            --secondary: #1f2937;
            --secondary-hover: #334155;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background: radial-gradient(900px 500px at 20% 0%, #1e293b 0%, transparent 70%),
                        radial-gradient(700px 400px at 85% 100%, #0f172a 0%, transparent 65%),
                        linear-gradient(160deg, var(--bg-a), var(--bg-b));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 560px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--panel);
            backdrop-filter: blur(8px);
            padding: 24px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .brand img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--line);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
        }

        p {
            margin: 8px 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .actions {
            margin-top: 18px;
            display: grid;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 0;
            border-radius: 12px;
            min-height: 44px;
            padding: 10px 14px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background-color .2s ease;
        }

        .btn-primary {
            color: #071011;
            background: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            color: var(--text);
            background: var(--secondary);
            border: 1px solid var(--line);
        }

        .btn-secondary:hover {
            background: var(--secondary-hover);
        }

        .meta {
            margin-top: 14px;
            font-size: 12px;
            color: var(--muted);
            border-top: 1px solid var(--line);
            padding-top: 12px;
        }

        .meta code {
            color: #cbd5e1;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
        }

        @media (max-width: 640px) {
            .card {
                padding: 18px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand">
            <img src="SYNTRIX_REF_LOGO.png" alt="Syntrix">
            <h1>Syntrix</h1>
        </div>

        <p id="description">Open the official Syntrix bot in Telegram.</p>

        <div class="actions">
            <a id="primaryBtn" class="btn btn-primary" href="https://t.me/AiSyntrixTrade_bot">Open Telegram</a>
        </div>
    </main>

    <script>
        (function () {
            var host = (window.location.hostname || '').toLowerCase().replace(/^www\./, '');
            var params = new URLSearchParams(window.location.search);
            var ref = params.get('ref');

            // Map channel hosts to direct channel links.
            var channelInviteByHost = {
                'info.siintrix.site': 'https://t.me/+ETuBMJ9s2Js1NmIy',
                'info.syntr1x.uno': 'https://t.me/+ETuBMJ9s2Js1NmIy',
                'ss.siintrix.site': 'https://t.me/+YmFilnI8DbFjNWEy',
                'road.siintrix.site': 'https://t.me/+TLo5_JI7r0wxODky',
                'invest.siintrix.site': 'https://t.me/+6w-QvvLfkt9iNzg6',
                'official.siintrix.site': 'https://t.me/+tvQ2u0yoEJRhOTBi'
            };

            var primaryBtn = document.getElementById('primaryBtn');
            var description = document.getElementById('description');

            var targetUrl;
            if (channelInviteByHost[host]) {
                targetUrl = channelInviteByHost[host];
                if (description) description.textContent = 'Open the official Syntrix channel in Telegram.';
                if (primaryBtn) primaryBtn.textContent = 'Join Channel';
            } else if (ref) {
                targetUrl = 'https://t.me/AiSyntrixTrade_bot?start=' + encodeURIComponent(ref);
                if (description) description.textContent = 'Open the Syntrix bot with your referral code.';
            } else {
                targetUrl = 'https://t.me/AiSyntrixTrade_bot';
            }

            if (primaryBtn) {
                primaryBtn.setAttribute('href', targetUrl);
            }

            // If the ref points to a channel campaign, prefer the generated channel invite.
            if (ref && /^mk_/i.test(ref)) {
                var apiBase = 'https://api.syntrix.uno';
                fetch(apiBase + '/api/marketing-links/' + encodeURIComponent(ref) + '/channel-invite')
                    .then(function (response) {
                        return response.ok ? response.json() : null;
                    })
                    .then(function (data) {
                        if (!data || !data.inviteLink || !primaryBtn) return;
                        primaryBtn.setAttribute('href', data.inviteLink);
                        primaryBtn.textContent = 'Join Channel';
                        if (description) description.textContent = 'Open the official Syntrix channel in Telegram.';
                    })
                    .catch(function () {
                        // Keep fallback URL when API is unavailable.
                    });
            }
        })();
    </script>
</body>
</html>
