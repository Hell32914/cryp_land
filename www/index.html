<html lang="en">
<head>

    <title>SYNTRIX - Automated Crypto Trading Platform</title>

        if (host !== 'crypto.syntr1x.uno' && host !== 'info.syntr1x.uno') {
            return;
        }

        var script = document.createElement('script');
        script.src = '/crypto-pixels.js';
        script.async = true;
        document.head.appendChild(script);
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --text: #edf3ff;
            --muted: rgba(182, 206, 247, 0.62);
            --line: rgba(123, 160, 230, 0.2);
            --primary: #138bff;
            --primary-hover: #2aa1ff;
            --primary-shadow: rgba(19, 139, 255, 0.43);
            --header-bg: rgba(3, 10, 28, 0.78);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: #030b22;
            overflow-x: hidden;
        }

        .site-shell {
            min-height: 100vh;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            background:
                radial-gradient(760px 470px at 52% 44%, rgba(23, 126, 255, 0.33), rgba(23, 126, 255, 0) 74%),
                linear-gradient(180deg, rgba(3, 11, 30, 0.84), rgba(3, 9, 25, 0.9)),
                url("REF_FON.webp");
            background-repeat: no-repeat;
            background-size: auto, auto, cover;
            background-position: center, center, center;
        }

        .site-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(600px 360px at 50% 34%, rgba(33, 146, 255, 0.14), rgba(33, 146, 255, 0) 78%),
                linear-gradient(180deg, rgba(2, 7, 20, 0.35), rgba(2, 6, 17, 0.62));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid rgba(109, 146, 219, 0.16);
            background: var(--header-bg);
            backdrop-filter: blur(10px);
        }

        .topbar-inner {
            width: min(1120px, 100% - 28px);
            margin: 0 auto;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            font-size: 37px;
            font-weight: 800;
            letter-spacing: 0.01em;
            text-decoration: none;
            background: linear-gradient(90deg, #46a7ff 0%, #0ea5ff 55%, #68d4ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .top-nav {
            display: flex;
            align-items: center;
            gap: 34px;
        }

        .top-nav a {
            color: rgba(213, 228, 255, 0.68);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color .2s ease;
        }

        .top-nav a:hover {
            color: #f0f7ff;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lang-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid rgba(146, 177, 239, 0.2);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(230, 240, 255, 0.86);
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
        }

        .lang-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #5ac8ff;
            box-shadow: 0 0 10px rgba(90, 200, 255, 0.8);
        }

        .top-cta,
        .hero-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            border: 0;
            border-radius: 12px;
            color: #f4f8ff;
            background: linear-gradient(100deg, #1a82ff 0%, #279dff 100%);
            box-shadow: 0 14px 34px var(--primary-shadow);
            transition: transform .2s ease, box-shadow .2s ease, background-color .2s ease;
        }

        .top-cta {
            min-height: 38px;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 700;
        }

        .hero-cta {
            min-height: 52px;
            padding: 0 30px;
            font-size: 17px;
            font-weight: 700;
        }

        .top-cta:hover,
        .hero-cta:hover {
            transform: translateY(-1px);
            background: linear-gradient(100deg, var(--primary) 0%, var(--primary-hover) 100%);
            box-shadow: 0 18px 40px rgba(31, 151, 255, 0.5);
        }

        .hero {
            min-height: calc(100vh - 64px);
            display: grid;
            place-items: center;
            position: relative;
            overflow: hidden;
            padding: 34px 16px 36px;
            z-index: 1;
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            pointer-events: none;
            z-index: -1;
            border-radius: 50%;
        }

        .hero::before {
            width: 640px;
            height: 640px;
            left: -230px;
            top: -290px;
            background: radial-gradient(circle, rgba(29, 111, 255, 0.27) 0%, rgba(29, 111, 255, 0) 76%);
        }

        .hero::after {
            width: 760px;
            height: 760px;
            right: -280px;
            bottom: -300px;
            background: radial-gradient(circle, rgba(31, 121, 255, 0.22) 0%, rgba(31, 121, 255, 0) 74%);
        }

        .rain-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .rain-layer::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(5, 16, 46, 0.18) 0%, rgba(2, 8, 24, 0.58) 100%);
        }

        .drop {
            position: absolute;
            top: -130px;
            width: 2px;
            height: 70px;
            border-radius: 4px;
            background: linear-gradient(180deg, rgba(67, 150, 255, 0) 0%, rgba(67, 150, 255, 0.55) 62%, rgba(67, 150, 255, 0) 100%);
            animation: drop-fall var(--speed, 11s) linear infinite;
            animation-delay: var(--delay, 0s);
            opacity: var(--opacity, 0.38);
            left: var(--left, 50%);
        }

        @keyframes drop-fall {
            to {
                transform: translateY(calc(100vh + 180px));
            }
        }

        .hero-content {
            width: min(980px, 100%);
            z-index: 1;
            text-align: center;
            animation: fade-up .7s ease both;
        }

        .hero-brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .hero-brand-text {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            font-size: clamp(34px, 5.8vw, 74px);
            font-weight: 800;
            letter-spacing: 0.06em;
            color: #f4f8ff;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 0 8px 24px rgba(18, 100, 250, 0.25);
        }

        .hero-spark {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 2px;
            margin-top: -24px;
            background: radial-gradient(circle at 30% 30%, #7fceff 0%, #2197ff 45%, rgba(33, 151, 255, 0) 80%);
            box-shadow: 0 0 14px rgba(33, 151, 255, 0.82);
        }

        .hero-title {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            line-height: 1.05;
            letter-spacing: -0.02em;
            font-size: clamp(44px, 7vw, 90px);
            font-weight: 800;
            color: #eaf2ff;
            text-shadow: 0 8px 22px rgba(5, 17, 54, 0.4);
        }

        .hero-title-accent {
            background: linear-gradient(90deg, #2e8fff 0%, #0ea5ff 45%, #5ec2ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: slide-gradient 3.5s linear infinite;
        }

        @keyframes slide-gradient {
            to {
                background-position: 200% center;
            }
        }

        #description {
            margin: 20px auto 0;
            width: min(820px, 100%);
            color: var(--muted);
            font-size: clamp(17px, 2.1vw, 37px);
            line-height: 1.35;
        }

        .hero-actions {
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }

        .arrow {
            transition: transform .2s ease;
        }

        .hero-cta:hover .arrow {
            transform: translateX(2px);
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            .topbar-inner {
                width: calc(100% - 24px);
                min-height: 60px;
            }

            .logo {
                font-size: 30px;
            }

            .top-nav {
                display: none;
            }

            .hero {
                min-height: calc(100vh - 60px);
            }

            .hero-brand {
                margin-bottom: 14px;
            }

            .hero-spark {
                margin-top: -18px;
                width: 9px;
                height: 9px;
            }

            #description {
                width: min(640px, 100%);
            }
        }

        @media (max-width: 620px) {
            .logo {
                font-size: 24px;
            }

            .top-actions {
                gap: 8px;
            }

            .lang-pill {
                display: none;
            }

            .top-cta {
                min-height: 34px;
                padding: 0 13px;
                font-size: 13px;
                border-radius: 10px;
            }

            .hero {
                padding-top: 20px;
            }

            .hero-cta {
                min-height: 48px;
                padding: 0 24px;
                font-size: 16px;
                border-radius: 11px;
            }
        }
    </style>
</head>
<body>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1070190051929151&ev=PageView&noscript=1"
    /></noscript>

    <div class="site-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <a class="logo" href="/">SYNTRIX</a>

                <nav class="top-nav" aria-label="Primary">
                    <a id="channelNav" href="https://t.me/SyntrixAI" target="_blank" rel="noopener noreferrer">Telegram Channel</a>
                    <a id="whitepaperNav" href="https://t.me/AiSyntrixTrade_bot" target="_blank" rel="noopener noreferrer">Whitepaper</a>
                </nav>

                <div class="top-actions">
                    <span class="lang-pill"><span class="lang-dot" aria-hidden="true"></span>GB</span>
                    <a id="topStartBtn" class="top-cta" href="https://t.me/AiSyntrixTrade_bot" target="_blank" rel="noopener noreferrer"><span id="topStartLabel">Get Started</span></a>
                </div>
            </div>
        </header>

        <main class="hero" aria-label="Syntrix Telegram entry">
            <div class="rain-layer" id="rainLayer" aria-hidden="true"></div>

            <div class="hero-content">
                <div class="hero-brand">
                    <span class="hero-brand-text">SYNTRIX</span>
                    <span class="hero-spark" aria-hidden="true"></span>
                </div>

                <h1 class="hero-title">
                    <span id="heroTitleTop">Automate Your</span>
                    <span id="heroTitleBottom" class="hero-title-accent">Crypto Trading</span>
                </h1>

                <p id="description">Professional AI-powered trading bot for 24/7 cryptocurrency trading on all major exchanges.</p>

                <div class="hero-actions">
                    <a id="primaryBtn" class="hero-cta" href="https://t.me/AiSyntrixTrade_bot" target="_blank" rel="noopener noreferrer">Start Trading <span class="arrow" aria-hidden="true">-&gt;</span></a>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function () {
            var host = (window.location.hostname || '').toLowerCase().replace(/^www\./, '');
            var params = new URLSearchParams(window.location.search);
            var ref = params.get('ref');

            var API_BASE = 'https://api.syntrix.uno';
            var BOT_URL = 'https://t.me/AiSyntrixTrade_bot';
            var DEFAULT_CHANNEL_URL = 'https://t.me/SyntrixAI';

            var channelInviteByHost = {
                'info.siintrix.site': 'https://t.me/+ETuBMJ9s2Js1NmIy',
                'info.syntr1x.uno': 'https://t.me/+ETuBMJ9s2Js1NmIy',
                'info.syntrixxx.site': 'https://t.me/+ETuBMJ9s2Js1NmIy',
                'ss.siintrix.site': 'https://t.me/+YmFilnI8DbFjNWEy',
                'ss.syntrixxx.site': 'https://t.me/+YmFilnI8DbFjNWEy',
                'ss.syntrixxx.website': 'https://t.me/+YmFilnI8DbFjNWEy',
                'road.siintrix.site': 'https://t.me/+TLo5_JI7r0wxODky',
                'road.syntrixxx.site': 'https://t.me/+TLo5_JI7r0wxODky',
                'road.syntrixxx.website': 'https://t.me/+TLo5_JI7r0wxODky',
                'invest.siintrix.site': 'https://t.me/+6w-QvvLfkt9iNzg6',
                'invest.syntrixxx.site': 'https://t.me/+6w-QvvLfkt9iNzg6',
                'official.siintrix.site': 'https://t.me/+tvQ2u0yoEJRhOTBi'
            };

            var primaryBtn = document.getElementById('primaryBtn');
            var topStartBtn = document.getElementById('topStartBtn');
            var topStartLabel = document.getElementById('topStartLabel');
            var channelNav = document.getElementById('channelNav');
            var whitepaperNav = document.getElementById('whitepaperNav');
            var description = document.getElementById('description');
            var heroTitleTop = document.getElementById('heroTitleTop');
            var heroTitleBottom = document.getElementById('heroTitleBottom');

            var hostChannelUrl = channelInviteByHost[host] || DEFAULT_CHANNEL_URL;
            var trackedBotUrl = ref ? BOT_URL + '?start=' + encodeURIComponent(ref) : BOT_URL;
            var targetUrl = BOT_URL;

            if (channelInviteByHost[host]) {
                targetUrl = hostChannelUrl;
            } else if (ref) {
                targetUrl = trackedBotUrl;
            }

            var navChannelUrl = ref && !/^mk_/i.test(ref) ? trackedBotUrl : hostChannelUrl;

            function setHref(element, url) {
                if (!element || !url) return;
                element.setAttribute('href', url);
            }

            function setBotCopy(withRef) {
                if (heroTitleTop) heroTitleTop.textContent = 'Automate Your';
                if (heroTitleBottom) heroTitleBottom.textContent = 'Crypto Trading';
                if (description) description.textContent = 'Professional AI-powered trading bot for 24/7 cryptocurrency trading on all major exchanges.';
                if (primaryBtn) primaryBtn.innerHTML = 'Start Trading <span class="arrow" aria-hidden="true">-&gt;</span>';
                if (topStartLabel) topStartLabel.textContent = 'Get Started';
            }

            function setChannelCopy() {
                if (heroTitleTop) heroTitleTop.textContent = 'Join Official';
                if (heroTitleBottom) heroTitleBottom.textContent = 'Telegram Channel';
                if (description) description.textContent = 'Open the official Syntrix channel in Telegram.';
                if (primaryBtn) primaryBtn.innerHTML = 'Join Channel <span class="arrow" aria-hidden="true">-&gt;</span>';
                if (topStartLabel) topStartLabel.textContent = 'Join';
            }

            setHref(primaryBtn, targetUrl);
            setHref(topStartBtn, targetUrl);
            setHref(channelNav, navChannelUrl);
            setHref(whitepaperNav, trackedBotUrl);

            if (channelInviteByHost[host]) {
                setChannelCopy();
            } else {
                setBotCopy();
            }

            if (ref && /^mk_/i.test(ref)) {
                fetch(API_BASE + '/api/marketing-links/' + encodeURIComponent(ref) + '/channel-invite')
                    .then(function (response) {
                        return response.ok ? response.json() : null;
                    })
                    .then(function (data) {
                        if (!data || !data.inviteLink) return;
                        setHref(primaryBtn, data.inviteLink);
                        setHref(topStartBtn, data.inviteLink);
                        setHref(channelNav, data.inviteLink);
                        setChannelCopy();
                    })
                    .catch(function () {
                        // Keep fallback URL when API is unavailable.
                    });
            }

            var rainLayer = document.getElementById('rainLayer');
            if (rainLayer) {
                var count = window.innerWidth < 768 ? 24 : 48;
                var fragment = document.createDocumentFragment();

                for (var i = 0; i < count; i++) {
                    var drop = document.createElement('span');
                    drop.className = 'drop';
                    drop.style.setProperty('--left', (Math.random() * 100).toFixed(2) + '%');
                    drop.style.setProperty('--delay', '-' + (Math.random() * 12).toFixed(2) + 's');
                    drop.style.setProperty('--speed', (10 + Math.random() * 9).toFixed(2) + 's');
                    drop.style.setProperty('--opacity', (0.2 + Math.random() * 0.3).toFixed(2));
                    drop.style.height = (32 + Math.random() * 72).toFixed(0) + 'px';
                    fragment.appendChild(drop);
                }

                rainLayer.appendChild(fragment);
            }
        })();
    </script>
